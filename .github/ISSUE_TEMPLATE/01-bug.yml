name: Bug
description: Report a reproducible defect in NeMo Relay.
title: "[Bug]: "
type: Bug
body:
  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      description: Select every area that appears related to the defect.
      multiple: true
      options:
        - Rust core runtime
        - Python binding
        - Node.js binding
        - Go binding
        - C FFI
        - Adaptive runtime
        - Middleware or guardrails
        - Plugins
        - Observability or exporters
        - Framework integrations
        - Build, packaging, or CI
        - Documentation or examples
        - Not sure
    validations: {required: true}
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: Describe what happened, including any error messages, traces, or incorrect output.
      placeholder: NeMo Relay currently...
    validations: {required: true}
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
      placeholder: I expected NeMo Relay to...
    validations: {required: true}
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest complete reproduction you can. Include commands and code snippets when useful.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations: {required: true}
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions, platform, installation source, and relevant toolchain details.
      placeholder: |
        - NeMo Relay version or commit:
        - OS and architecture:
        - Rust version:
        - Python version:
        - Node.js version:
        - Go version:
        - Install/build command:
    validations: {required: true}
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain who is affected and whether there is a workaround. Enter N/A if not applicable.
      placeholder: This affects...
    validations: {required: true}
