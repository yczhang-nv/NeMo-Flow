name: Build pull request

on:
  push:
    branches:
      - 'pull-request/**'
      - 'main'
      - 'release/**'
    tags:
      - '*'

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

env:
  NEMO_FLOW_CI_DEFAULT_PYTHON_VER: "3.11"
  NEMO_FLOW_CI_RUST_VERSION: "1.93.0"
  NEMO_FLOW_CI_NODE_VERSION: "24"
  NEMO_FLOW_CI_UV_VERSION: "0.9.28"
  NEMO_FLOW_CI_JUST_VERSION: "1.47.1"

jobs:

  pr-builder:
    needs:
      - prepare
      - ci_pipe
    if: ${{ github.ref_type != 'tag' }}
    permissions:
      contents: read
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@4866bb5437e913caf5bf775f57c91abd144ed391 # main
    with:
      needs: ${{ toJSON(needs) }}

  prepare:
    # Executes the get-pr-info action to determine if the PR has the skip-ci label, if the action fails we assume the
    # PR does not have the label
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Get PR Info
        id: get-pr-info
        uses: nv-gha-runners/get-pr-info@090577647b8ddc4e06e809e264f7881650ecdccf # main
        if: ${{ startsWith(github.ref_name, 'pull-request/') }}

      - name: Validate release tag format
        if: ${{ github.ref_type == 'tag' }}
        run: |
          set -e
          tag="${{ github.ref_name }}"
          if [[ "$tag" == v* ]]; then
            echo "Error: release tags must not start with 'v'; use raw SemVer such as 0.1.0 or 0.1.0-rc.1" >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|rc)\.[0-9]+))?$ ]]; then
            echo "Error: unsupported release tag format '$tag'; use 0.1.0 or prereleases like 0.1.0-rc.1" >&2
            exit 1
          fi
    outputs:
      is_pr: ${{ startsWith(github.ref_name, 'pull-request/') }}
      is_main_branch: ${{ github.ref_name == 'main' }}
      has_skip_ci_label: ${{ steps.get-pr-info.outcome == 'success' && contains(fromJSON(steps.get-pr-info.outputs.pr-info).labels.*.name, 'skip-ci') || false }}
      pr_info: ${{ steps.get-pr-info.outcome == 'success' && steps.get-pr-info.outputs.pr-info || '' }}


  ci_pipe:
    name: CI Pipeline
    needs: [prepare]
    uses: ./.github/workflows/ci_pipe.yml
    if: ${{ ! fromJSON(needs.prepare.outputs.has_skip_ci_label) }}
    permissions:
      contents: read
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      # Info about the PR. Empty for non PR branches. Useful for extracting PR number, title, etc.
      pr_info: ${{ needs.prepare.outputs.pr_info }}
      ref_type: ${{ github.ref_type }}
      ref_name: ${{ github.ref_name }}

  deploy-docs:
    name: Deploy Documentation
    needs: [ci_pipe]
    if: ${{ needs.ci_pipe.result == 'success' && (github.ref_name == 'main' || github.ref_type == 'tag') }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages Site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  publish-rust:
    name: Publish / crates.io
    needs: [ci_pipe]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment: crates.io
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ${{ github.workspace }}/NeMo-Flow

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: ${{ github.workspace }}/NeMo-Flow/uv.lock

      - name: Install managed Python
        run: |
          set -e
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - name: Stamp Cargo release version
        working-directory: ${{ github.workspace }}/NeMo-Flow
        run: just --set ref_name "${{ github.ref_name }}" stamp-cargo-release-version

      - name: Authenticate to crates.io with trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io with trusted publishing
        working-directory: ${{ github.workspace }}/NeMo-Flow
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          set -euo pipefail
          for package in nemo-flow nemo-flow-adaptive nemo-flow-ffi; do
            cargo publish --package "$package" --no-verify --allow-dirty
          done

  publish-python:
    name: Publish / PyPI
    needs: [ci_pipe]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-npm:
    name: Publish / npm
    needs: [ci_pipe]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEMO_FLOW_CI_NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download consolidated Node package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-consolidated
          path: .

      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-bundler
          path: wasm-package/

      - name: Select npm dist-tag
        run: |
          set -e
          npm_tag="latest"
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            npm_tag="next"
          fi
          printf 'NEMO_FLOW_NPM_DIST_TAG=%s\n' "$npm_tag" >> "$GITHUB_ENV"

      - name: Publish Node.js package to npm
        run: |
          set -euo pipefail
          unzip -q ./consolidated.zip -d combined
          echo "Platform binaries included:"
          ls -la combined/package/*.node
          npm publish ./combined/package --access public --tag "${NEMO_FLOW_NPM_DIST_TAG}"

      - name: Publish WASM package to npm
        run: |
          set -e
          for pkg in ./wasm-package/*.tgz; do
            echo "Publishing ${pkg}..."
            npm publish "${pkg}" --access public --tag "${NEMO_FLOW_NPM_DIST_TAG}"
          done
