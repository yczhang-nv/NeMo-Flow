ci:
  - '.github/actionlint.yaml'
  - '.github/ci-path-filters.yml'
  - '.github/workflows/**'
  - 'codecov.yml'

shared:
  - 'crates/adaptive/Cargo.toml'
  - 'crates/adaptive/src/**'
  - 'crates/core/Cargo.toml'
  - 'crates/core/src/**'
  - 'justfile'
  - 'rust-toolchain.toml'

dependencies:
  - 'Cargo.lock'
  - 'Cargo.toml'
  - 'about.toml'
  - 'crates/**/Cargo.toml'
  - 'crates/**/package.json'
  - 'integrations/**/package.json'
  - 'package.json'
  - 'package-lock.json'
  - 'pyproject.toml'
  - 'scripts/licensing/**'
  - 'uv.lock'

docs:
  - 'CONTRIBUTING.md'
  - 'README.md'
  - 'crates/adaptive/src/**'
  - 'crates/core/src/**'
  - 'crates/node/*.d.ts'
  - 'crates/node/*.js'
  - 'crates/**/*.md'
  - 'docs/**'
  - 'integrations/coding-agents/**'
  - 'python/nemo_flow/**'
  - 'scripts/build-docs.sh'
  - 'scripts/docs/**'

rust:
  - 'Cargo.lock'
  - 'Cargo.toml'
  - 'crates/**/Cargo.toml'
  - 'crates/**/*.rs'
  - 'crates/ffi/cbindgen.toml'
  - 'integrations/coding-agents/**'

go:
  - 'crates/ffi/Cargo.toml'
  - 'crates/ffi/build.rs'
  - 'crates/ffi/cbindgen.toml'
  - 'crates/ffi/nemo_flow.h'
  - 'crates/ffi/src/**'
  - 'go/**/!(*.md)'

node:
  - 'package.json'
  - 'package-lock.json'
  - 'crates/node/Cargo.toml'
  - 'crates/node/build.rs'
  - 'crates/node/package.json'
  - 'crates/node/*.d.ts'
  - 'crates/node/*.js'
  - 'crates/node/src/**'
  - 'crates/node/tests/**/*.mjs'
  - 'scripts/test-support/**'

openclaw:
  - 'integrations/openclaw/**'

python:
  - 'crates/python/Cargo.toml'
  - 'crates/python/src/**'
  - 'pyproject.toml'
  - 'python/**/!(*.md)'
  - 'uv.lock'

wasm:
  - 'crates/wasm/Cargo.toml'
  - 'crates/wasm/package.json'
  - 'crates/wasm/scripts/**'
  - 'crates/wasm/src/**'
  - 'crates/wasm/tests-js/**'
  - 'scripts/test-support/**'
