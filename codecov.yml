codecov:
  require_ci_to_pass: true
  notify:
    # Codecov counts one build per upload step in a full CI run:
    # | Binding     | Platforms that upload coverage                                      | Uploads |
    # |-------------|----------------------------------------------------------------------|---------|
    # | Rust        | linux-amd64, linux-arm64, macos-arm64, windows-amd64                 | 4       |
    # | Python      | linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64  | 5       |
    # | Go          | linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64  | 5       |
    # | Node.js     | linux-amd64, linux-arm64, macos-arm64                                | 3       |
    # | Total       |                                                                      | 17      |
    after_n_builds: 17
    wait_for_ci: true

coverage:
  round: nearest
  precision: 2
  range: "94...100"
  status:
    project:
      default:
        target: 88%
        threshold: 0.5%
        base: auto
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 5%
        base: auto
        if_ci_failed: error

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 0.5%
        base: auto
        if_ci_failed: error
  individual_components:
    - component_id: rust_runtime
      name: Rust Runtime
      paths:
        - "crates/core/src"
        - "crates/adaptive/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: shared_types
      name: Shared DTO Types
      paths:
        - "crates/types/src"
      statuses:
        - type: project
          target: auto
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: cli
      name: CLI
      paths:
        - "crates/cli/src"
      statuses:
        - type: project
          target: 88%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: go_binding
      name: Go Binding
      paths:
        - "go/nemo_relay"
        - "crates/ffi/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: python_binding
      name: Python Binding
      paths:
        - "python/nemo_relay"
        - "crates/python/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: node_binding
      name: Node Binding
      paths:
        - "crates/node/*.js"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: plugin_sdk
      name: Dynamic Plugin SDKs
      paths:
        - "crates/types/src"
        - "crates/plugin/src"
        - "crates/worker-proto/src"
        - "crates/worker/src"
        - "python/plugin/src/nemo_relay_plugin"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error

comment:
  after_n_builds: 17
  layout: "header, diff, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false

github_checks:
  annotations: false

ignore:
  - "**/examples/**"
  - "**/tests/**"
  - "crates/cli/tests/"
  # CLI TTY shells are exercised by smoke tests, but their prompt loops are
  # intentionally split away from testable model modules.
  - "crates/cli/src/plugins.rs"
  - "crates/cli/src/setup.rs"
  - "**/tests-js/**"
  # The Node binding currently reports JS package coverage separately; exclude the
  # native Rust bridge until we have direct Rust-side coverage for this crate.
  - "crates/node/src/"
  - "crates/node/coverage/"
  - "target/"
  - "**/*.d.ts"
  - "**/*.pyi"
  - "python/plugin/src/nemo_relay_plugin/_proto/**"
  - "python/nemo_relay/lib_native*.dylib.dSYM/**"
