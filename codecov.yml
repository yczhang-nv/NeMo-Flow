codecov:
  require_ci_to_pass: true
  notify:
    # Codecov counts one build per upload step in a full CI run:
    # | Binding     | Platforms that upload coverage                                      | Uploads |
    # |-------------|----------------------------------------------------------------------|---------|
    # | Rust        | linux-amd64, linux-arm64, macos-arm64, windows-amd64                 | 4       |
    # | Python      | linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64  | 5       |
    # | Go          | linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64  | 5       |
    # | Node.js     | linux-amd64, linux-arm64, macos-arm64                                | 3       |
    # | WebAssembly | linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64  | 5       |
    # | Total       |                                                                      | 22      |
    after_n_builds: 22
    wait_for_ci: true

coverage:
  round: nearest
  precision: 2
  range: "94...100"
  status:
    project:
      default:
        target: 88%
        threshold: 0.5%
        base: auto
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 5%
        base: auto
        if_ci_failed: error

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 0.5%
        base: auto
        if_ci_failed: error
  individual_components:
    - component_id: rust_runtime
      name: Rust Runtime
      paths:
        - "NeMo-Flow/crates/core/src"
        - "NeMo-Flow/crates/adaptive/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: go_binding
      name: Go Binding
      paths:
        - "NeMo-Flow/go/nemo_flow"
        - "NeMo-Flow/crates/ffi/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: python_binding
      name: Python Binding
      paths:
        - "NeMo-Flow/python/nemo_flow"
        - "NeMo-Flow/crates/python/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: node_binding
      name: Node Binding
      paths:
        - "NeMo-Flow/crates/node/*.js"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: wasm_binding
      name: WebAssembly Binding
      paths:
        - "NeMo-Flow/crates/wasm/wrappers/nodejs/*.js"
      statuses:
        - type: project
          target: 84% # cannot be any higher due to internals
          threshold: 0.5%
          base: auto
          if_ci_failed: error

comment:
  after_n_builds: 22
  layout: "header, diff, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false

github_checks:
  annotations: false

ignore:
  - "**/examples/**"
  - "**/third_party/**"
  - "**/tests/**"
  - "**/tests-js/**"
  # The Node binding currently reports JS package coverage separately; exclude the
  # native Rust bridge until we have direct Rust-side coverage for this crate.
  - "**/crates/node/src/**"
  - "**/crates/node/coverage/**"
  - "**/target/**"
  - "**/*.d.ts"
  - "**/*.pyi"
  - "**/python/nemo_flow/lib_native*.dylib.dSYM/**"
  # WebAssembly Rust wrappers are covered through wasm-pack execution and
  # reported through generated package JavaScript coverage.
  - "**/crates/wasm/src/**/*.rs"
